<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <style>
        body {
            font-family: sans-serif;
            background-color: #f0f0f0;
            
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background-color: white;
            padding: 20px;
            width: 300px;
            border: 1px solid #ccc;
        }

        h2 {
            margin-top: 0;
            color: #333;
            margin-bottom: 20px;
            text-align: center; /* This centers the header text inside the box */
        }

        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        button[type="submit"] {
            display: block;
            width: 100%;
            background-color: #e0e0e0;
            color: black;
            padding: 10px;
            margin-bottom: 10px;
            border: none;
            font-size: 1rem;
            cursor: pointer;
        }

        button[type="submit"]:hover {
            background-color: #d0d0d0;
        }

        .register-link {
            display: block;
            background-color: #e0e0e0;
            color: black;
            padding: 10px;
            text-decoration: none;
            text-align: center;
        }

        .register-link:hover {
            background-color: #d0d0d0;
        }
    </style>

</head>
<body>

    <div class="container">
    <h2>Student Login</h2>

    <form method="POST" action="login.php">
        <input type="email" name="email" placeholder="Email" required>

        <input type="password" name="password" placeholder="Password" required>
        
        <button type="submit">Login</button>
        <a href="register.html" class="register-link">Register</a>
    </form>
</div>
    
</body>
</html>
